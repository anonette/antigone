  prompt: 'A person died after committing a terrorist attack. Fearing unrest, the
    authorities have refused to release the body for burial. A relative can either
    obey the ban or bury the body in secret. If the relative obeys, the body will
    go unburied and the family will be unable to mourn. If the relative disobeys,
    the law is broken and unrest may follow.


    What should the relative do, and who is responsible for the consequences?

    '
  translation_status:
    cs: parallel
    ja: parallel
  hypothesis_note: Cross-language baseline only; language is the sole IV.
  label: P1 — English baseline
  description_en: Open cross-language baseline; natural English agentive syntax. Language
    is the sole IV.
  description_cs: Výchozí anglická verze; běžná agentivní syntax. Jediná manipulace
    = jazyk (fáze 1).
  baseline_stimulus_id: P1-EN
- stimulus_id: P1-CS
  phase: 1
  framing: open
  language: cs
  EN-AG: null
  CZ-AG: null
  CZ-OB: null
  CZ-AF: null
  CZ-PR: null
  JP-V: null
  JP-A: null
  JP-E: null
  JP-H: null
  JP-S: null
  prompt: 'Po teroristickém útoku zemřela osoba, jejíž tělo úřady kvůli obavám z nepokojů
    odmítly rodině vydat k pohřbu. Příbuzná se může podřídit zákazu pohřbu, nebo zemřelého
    tajně pohřbít. Pokud se zákazu podřídí, zemřelý nebude pohřben a rodina nebude
    moci truchlit. Pokud zákaz nedodrží, poruší zákon a hrozí nepokoje.


    Co má příbuzná udělat a kdo nese odpovědnost za následky?

    '
  translation_status:
    cs: parallel
    ja: parallel
  hypothesis_note: Semantic parallel to P1-EN; not a framing variant.
  label: P1 — Czech baseline
  description_en: Semantic parallel to P1-EN; agentive Czech (authorities refused
    to release the body).
  description_cs: Sémantická paralela k P1-EN; agentivní čeština (úřady odmítly vydat
    tělo rodině).
  baseline_stimulus_id: P1-CS
- stimulus_id: P1-JA
