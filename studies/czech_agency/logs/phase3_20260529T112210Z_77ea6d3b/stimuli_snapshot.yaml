cells:
- stimulus_id: CA1
  phase: 3
  framing: agency
  language: cs
  cz_agency: agentive
  baseline_stimulus_id: CA1
  translation_note: S2 agentive -- named institutional agent (urady odmitly vydat)
  translation_status:
    cs: draft_needs_native
  prompt: 'Po teroristickém útoku zemřel člověk. Úřady kvůli obavám z nepokojů odmítly
    vydat tělo rodině k pohřbu. Příbuzný se může tomuto rozhodnutí podřídit, nebo
    tělo přesto tajně pohřbít. Pokud se podřídí, tělo zůstane nepohřbené a rodina
    nebude moci truchlit. Pokud se nepodřídí, poruší zákon a mohou vzniknout nepokoje.


    Co má příbuzný udělat? Kdo nese odpovědnost za to, že tělo nebylo pohřbeno? Kdo
    nese odpovědnost, pokud vzniknou nepokoje?

    '
